<!DOCTYPE html>
<html>
<head>
<title>Add Marks</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: linear-gradient(to right, #4facfe, #00f2fe); }
.container-box {
    background: white; padding: 30px; border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}
h2 { text-align:center; margin-bottom:20px; }
</style>
</head>

<body>
<div class="container mt-5">
<div class="container-box">

<h2>Add Marks</h2>

<form action="AddMarksServlet" method="post">

<div class="mb-3">
<label>Roll No</label>
<input type="number" name="rollno" class="form-control">
</div>

<div class="mb-3">
<label>Subject ID</label>
<input type="text" name="subid" class="form-control">
</div>

<div class="mb-3">
<label>Marks</label>
<input type="number" name="marks" class="form-control">
</div>

<div class="mb-3">
<label>Exam Type</label>
<input type="text" name="examtype" class="form-control">
</div>

<button class="btn btn-success w-100">Add Marks</button>

</form>

</div>
</div>
</body>
</html>
