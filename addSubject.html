<!DOCTYPE html>
<html>
<head>
<title>Add Subject</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: linear-gradient(to right, #4facfe, #00f2fe); }
.container-box {
    background: white; padding: 30px; border-radius: 15px;
    box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
}
h2 { text-align:center; margin-bottom:20px; }
</style>
</head>

<body>
<div class="container mt-5">
<div class="container-box">

<h2>Add Subject</h2>

<form action="AddSubjectServlet" method="post">

<div class="mb-3">
<label>Subject ID</label>
<input type="text" name="subid" class="form-control">
</div>

<div class="mb-3">
<label>Subject Name</label>
<input type="text" name="subname" class="form-control">
</div>

<div class="mb-3">
<label>Max Marks</label>
<input type="number" name="maxmarks" class="form-control">
</div>

<div class="mb-3">
<label>Pass Marks</label>
<input type="number" name="passmarks" class="form-control">
</div>

<button class="btn btn-warning w-100">Add Subject</button>

</form>

</div>
</div>
</body>
</html>
