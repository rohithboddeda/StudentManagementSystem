<!DOCTYPE html>
<html>
<head>
    <title>Student Management System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #4facfe, #00f2fe);
        }
        .card {
            border-radius: 15px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
        }
    </style>
</head>

<body>

<div class="container mt-5">

    <h1>🎓 Student Management System</h1>

    <div class="row g-4">

        <!-- Add Student -->
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Add Student</h5>
                <a href="addStudent.html" class="btn btn-primary">Open</a>
            </div>
        </div>

        <!-- Add Subject -->
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Add Subject</h5>
                <a href="addSubject.html" class="btn btn-warning">Open</a>
            </div>
        </div>

        <!-- Add Marks -->
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Add Marks</h5>
                <a href="addMarks.html" class="btn btn-success">Open</a>
            </div>
        </div>

        <!-- Update Marks -->
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Update Marks</h5>
                <a href="updateMarks.html" class="btn btn-danger">Open</a>
            </div>
        </div>

        <!-- Student Report -->
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Student Report</h5>
                <a href="studentReport.html" class="btn btn-dark">Open</a>
            </div>
        </div>

        <!-- Result -->
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Check Result</h5>
                <a href="result.html" class="btn btn-info">Open</a>
            </div>
        </div>

        <!-- Compare Marks -->
        <div class="col-md-4">
            <div class="card text-center p-3">
                <h5>Compare Marks</h5>
                <a href="compareMarks.html" class="btn btn-secondary">Open</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
